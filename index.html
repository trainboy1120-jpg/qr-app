<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バッグ修理管理 | DEJ6</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh;font-size:14px;line-height:1.5}
.header{background:#fff;border-bottom:2px solid #e2e8f0;padding:0 1rem;position:sticky;top:0;z-index:100}
.header-inner{max-width:900px;margin:0 auto;height:54px;display:flex;align-items:center;justify-content:space-between}
.header-left h1{font-size:15px;font-weight:700}
.header-meta{display:flex;align-items:center;gap:12px;margin-top:2px}
.date-str{font-size:11px;color:#718096}
.live{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#38a169;font-weight:500}
.live-dot{width:6px;height:6px;border-radius:50%;background:#38a169;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.wrap{max-width:900px;margin:0 auto;padding:1.25rem 1rem}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;color:#1a202c;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .12s}
.btn:hover{background:#f7fafc}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#0F6E56;color:#fff;border-color:transparent}
.btn-primary:hover{background:#0a5240}
.btn-danger{background:#dc2626;color:#fff;border-color:transparent}
.btn-danger:hover{background:#b91c1c}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:1rem 1.25rem}
.stat-label{font-size:11px;color:#718096;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.stat-val{font-size:30px;font-weight:700;line-height:1}
.val-green{color:#0F6E56}
.val-red{color:#dc2626}
.tabs{display:flex;border-bottom:2px solid #e2e8f0;margin-bottom:1.25rem}
.tab{padding:8px 18px;border:none;background:transparent;font-size:13px;color:#718096;cursor:pointer;font-family:inherit;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s}
.tab.on{color:#0F6E56;border-bottom-color:#0F6E56;font-weight:700}
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.filter-bar select{padding:5px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;font-family:inherit;color:#4a5568;background:#fff;outline:none}
.record-count{font-size:12px;color:#a0aec0;margin-left:auto}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:#f7fafc}
th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e2e8f0;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.td-time{color:#a0aec0;font-size:12px;white-space:nowrap}
.td-bag{font-weight:600;font-size:12px;color:#4a5568}
.td-worker{color:#718096;font-size:12px}
.td-issue{font-size:12px}
.td-memo{color:#a0aec0;font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-r{background:#dcfce7;color:#166534}
.badge-d{background:#fee2e2;color:#991b1b}
.empty{text-align:center;padding:3rem 1rem;color:#a0aec0;font-size:13px}
.chart-section{padding:1.25rem}
.chart-title{font-size:12px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem}
.chart-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.chart-label{font-size:12px;color:#4a5568;width:210px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar-bg{flex:1;height:8px;background:#f0f4f8;border-radius:4px;overflow:hidden}
.chart-bar{height:100%;border-radius:4px;transition:width .4s}
.bar-r{background:#0F6E56}
.bar-d{background:#dc2626}
.chart-n{font-size:12px;font-weight:600;color:#4a5568;width:28px;text-align:right}
.chart-sep{height:1px;background:#f0f4f8;margin:1rem 0}
.qr-section-title{font-size:11px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.05em;margin:1.25rem 0 .75rem;padding-left:2px}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
.qr-item{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:1rem;display:flex;flex-direction:column;align-items:center;gap:8px}
.qr-item img{border-radius:6px;display:block}
.qr-item-label{font-size:11px;font-weight:600;text-align:center;color:#1a202c;line-height:1.4}
.qr-item-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.print-bar{display:flex;justify-content:flex-end;margin-bottom:1rem}
@media print{
  .header,.tabs,.print-bar,.stats{display:none!important}
  .wrap{padding:0}
  body{background:#fff}
  .qr-grid{grid-template-columns:repeat(4,1fr);gap:8px}
  .qr-item{border:1px solid #ccc;break-inside:avoid}
}
.overlay{position:fixed;inset:0;background:rgba(15,25,40,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:15px;font-weight:700}
.x-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#a0aec0;width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center}
.x-btn:hover{background:#f0f4f8;color:#1a202c}
.fg{margin-bottom:.9rem}
.fg label{display:block;font-size:11px;font-weight:600;color:#718096;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;font-family:inherit;color:#1a202c;outline:none;background:#fff;transition:border .12s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#0F6E56;box-shadow:0 0 0 3px rgba(15,110,86,.08)}
.fg textarea{resize:vertical;min-height:56px}
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.9rem}
.act-btn{padding:10px 8px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;text-align:center;transition:all .12s;color:#718096}
.act-btn.r.on{border-color:#0F6E56;background:#f0fdf4;color:#0F6E56}
.act-btn.d.on{border-color:#dc2626;background:#fef2f2;color:#dc2626}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a202c;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:9999;pointer-events:none;animation:fadeup .2s}
@keyframes fadeup{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.hide-sp{display:none}.chart-label{width:130px}.qr-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://uaxyskjcvfpzuobfcynx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheHlza2pjdmZwenVvYmZjeW54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDA1ODYsImV4cCI6MjA5NTgxNjU4Nn0.ybjRpDFJZTer4-rhaIwvPz6Xo1QYA2qluuUkpk0X62g';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
const { useState, useEffect, useCallback } = React;
const APP_URL = 'https://trainboy1120-jpg.github.io/qr-app/';

const REPAIR_ISSUES = [
  'ジッパー修理：ランナー脱落',
  'ジッパー修理：引き手脱落',
  'QRコード修理（2枚以上破損）',
];
const DISPOSAL_ISSUES = [
  '廃棄：修理済みバッグ（再修理不可）',
  '廃棄：QRコード全損（3枚全て）',
  '廃棄：底面・底板損傷',
  '廃棄：ジッパー修理不可',
  '廃棄：底面以外の損傷（穴あき等）',
  '廃棄：液漏れ汚損',
  '廃棄：ストラップ・ベルクロ損傷',
];

const fmtToday=()=>new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
const fmtDT=iso=>iso?new Date(iso).toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
const parse=log=>{try{return JSON.parse(log.comment||'{}');}catch{return{bag_id:'—',issue:log.comment||'—',action:'—',memo:''};}};

function getParams(){
  const p=new URLSearchParams(window.location.search);
  return{action:p.get('a')||null,issue:p.get('i')||null};
}

let sysId=null;
async function getSysId(){
  if(sysId)return sysId;
  const{data}=await supabase.from('qr_codes').select('id').eq('title','__bag_repair__').limit(1);
  if(data?.length){sysId=data[0].id;return sysId;}
  const{data:ins}=await supabase.from('qr_codes').insert({title:'__bag_repair__',url:'system',scans:0,color:'#000000'}).select().single();
  sysId=ins?.id;return sysId;
}

function QRImg({text,size=130}){
  const src='https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&data='+encodeURIComponent(text)+'&ecc=M';
  return React.createElement('img',{src,width:size,height:size,alt:'QR',loading:'lazy',style:{borderRadius:6,display:'block'}});
}

function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t)},[]);
  return React.createElement('div',{className:'toast'},msg);
}

function AddModal({onClose,onAdd,initAction,initIssue}){
  const[action,setAction]=useState(initAction||'修理');
  const[issue,setIssue]=useState(initIssue||(initAction==='廃棄'?DISPOSAL_ISSUES[0]:REPAIR_ISSUES[0]));
  const[bagId,setBagId]=useState('');
  const[worker,setWorker]=useState('');
  const[memo,setMemo]=useState('');
  const[saving,setSaving]=useState(false);
  const issues=action==='修理'?REPAIR_ISSUES:DISPOSAL_ISSUES;
  useEffect(()=>{if(!initIssue)setIssue(issues[0]);},[action]);
  const submit=async()=>{
    if(!bagId.trim()||!worker.trim())return;
    setSaving(true);
    await onAdd({action,issue,bag_id:bagId.trim(),worker:worker.trim(),memo:memo.trim()});
    setSaving(false);
  };
  const h=(t,p,...c)=>React.createElement(t,p,...c);
  return h('div',{className:'overlay',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'modal'},
      h('div',{className:'modal-header'},
        h('div',{className:'modal-title'},'修理記録を追加'),
        h('button',{className:'x-btn',onClick:onClose},'×')
      ),
      h('div',{style:{marginBottom:'.9rem'}},
        h('div',{style:{fontSize:11,fontWeight:600,color:'#718096',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:4}},'アクション'),
        h('div',{className:'act-row'},
          h('button',{className:'act-btn r'+(action==='修理'?' on':''),onClick:()=>setAction('修理')},'🔧 修理'),
          h('button',{className:'act-btn d'+(action==='廃棄'?' on':''),onClick:()=>setAction('廃棄')},'🗑 廃棄'))
      ),
      h('div',{className:'fg'},h('label',null,'問題種別'),h('select',{value:issue,onChange:e=>setIssue(e.target.value)},issues.map(i=>h('option',{key:i,value:i},i)))),
      h('div',{className:'fg'},h('label',null,'バッグID＊'),h('input',{type:'text',placeholder:'スキャンまたは入力',value:bagId,onChange:e=>setBagId(e.target.value),autoFocus:true})),
      h('div',{className:'fg'},h('label',null,'作業者名＊'),h('input',{type:'text',placeholder:'例：田中',value:worker,onChange:e=>setWorker(e.target.value)})),
      h('div',{className:'fg'},h('label',null,'メモ（任意）'),h('textarea',{placeholder:'特記事項など',value:memo,onChange:e=>setMemo(e.target.value)})),
      h('div',{style:{display:'flex',gap:8,marginTop:4}},
        h('button',{className:'btn',style:{flex:1},onClick:onClose},'キャンセル'),
        h('button',{className:'btn '+(action==='修理'?'btn-primary':'btn-danger'),style:{flex:2},onClick:submit,disabled:!bagId.trim()||!worker.trim()||saving},saving?'記録中...':'記録する')
      )
    )
  );
}

function QRListTab(){
  const h=(t,p,...c)=>React.createElement(t,p,...c);
  return h('div',null,
    h('div',{className:'print-bar'},h('button',{className:'btn',onClick:()=>window.print()},'🖨 印刷')),
    h('div',{className:'qr-section-title'},'🔧 修理'),
    h('div',{className:'qr-grid'},REPAIR_ISSUES.map(issue=>{
      const url=APP_URL+'?a=修理&i='+encodeURIComponent(issue);
      return h('div',{key:issue,className:'qr-item'},
        h(QRImg,{text:url,size:130}),
        h('span',{className:'qr-item-badge badge badge-r'},'修理'),
        h('div',{className:'qr-item-label'},issue));
    })),
    h('div',{className:'qr-section-title'},'🗑 廃棄'),
    h('div',{className:'qr-grid'},DISPOSAL_ISSUES.map(issue=>{
      const url=APP_URL+'?a=廃棄&i='+encodeURIComponent(issue);
      return h('div',{key:issue,className:'qr-item'},
        h(QRImg,{text:url,size:130}),
        h('span',{className:'qr-item-badge badge badge-d'},'廃棄'),
        h('div',{className:'qr-item-label'},issue));
    }))
  );
}

function App(){
  const[logs,setLogs]=useState([]);
  const[tab,setTab]=useState('list');
  const[filter,setFilter]=useState('all');
  const[showAdd,setShowAdd]=useState(false);
  const[initParams,setInitParams]=useState({action:null,issue:null});
  const[toast,setToast]=useState(null);
  const[loading,setLoading]=useState(true);
  const notify=msg=>setToast(msg);
  const h=(t,p,...c)=>React.createElement(t,p,...c);

  const fetchLogs=useCallback(async()=>{
    const{data}=await supabase.from('scan_logs').select('*').order('scanned_at',{ascending:false}).limit(500);
    if(data)setLogs(data);
  },[]);

  useEffect(()=>{
    const{action,issue}=getParams();
    if(action){setInitParams({action,issue});setShowAdd(true);}
    (async()=>{await getSysId();await fetchLogs();setLoading(false);})();
    const ch=supabase.channel('bag_repair_ch').on('postgres_changes',{event:'*',schema:'public',table:'scan_logs'},fetchLogs).subscribe();
    return()=>supabase.removeChannel(ch);
  },[fetchLogs]);

  const handleAdd=async({action,issue,bag_id,worker,memo})=>{
    const id=await getSysId();
    const{error}=await supabase.from('scan_logs').insert({qr_code_id:id,worker_name:worker,comment:JSON.stringify({action,issue,bag_id,memo})});
    if(error){notify('エラー: '+error.message);return;}
    setShowAdd(false);
    window.history.replaceState({},'',APP_URL);
    notify('✓ 記録しました');
  };

  const todayDate=new Date().toDateString();
  const todayLogs=logs.filter(l=>new Date(l.scanned_at).toDateString()===todayDate);
  const todayR=todayLogs.filter(l=>{try{return JSON.parse(l.comment).action==='修理';}catch{return false;}}).length;
  const todayD=todayLogs.filter(l=>{try{return JSON.parse(l.comment).action==='廃棄';}catch{return false;}}).length;
  const filtered=logs.filter(l=>{const d=parse(l);if(filter==='repair')return d.action==='修理';if(filter==='disposal')return d.action==='廃棄';return true;});
  const issueStats={};
  logs.forEach(l=>{const d=parse(l);if(d.issue&&d.issue!=='—')issueStats[d.issue]=(issueStats[d.issue]||0)+1;});
  const maxN=Math.max(...Object.values(issueStats),1);
  const repairStats=Object.entries(issueStats).filter(([k])=>REPAIR_ISSUES.includes(k)).sort((a,b)=>b[1]-a[1]);
  const disposalStats=Object.entries(issueStats).filter(([k])=>DISPOSAL_ISSUES.includes(k)).sort((a,b)=>b[1]-a[1]);

  if(loading)return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',color:'#718096'}},'読み込み中...');

  return h(React.Fragment,null,
    h('div',{className:'header'},h('div',{className:'header-inner'},
      h('div',{className:'header-left'},
        h('h1',null,'バッグ修理管理'),
        h('div',{className:'header-meta'},
          h('span',{className:'date-str'},fmtToday()),
          h('span',{className:'live'},h('span',{className:'live-dot'}),'リアルタイム同期中')
        )
      ),
      h('button',{className:'btn btn-primary',onClick:()=>{setInitParams({action:null,issue:null});setShowAdd(true);}},'＋ 記録追加')
    )),
    h('div',{className:'wrap'},
      h('div',{className:'stats'},
        h('div',{className:'stat'},h('div',{className:'stat-label'},'今日の修理'),h('div',{className:'stat-val val-green'},todayR)),
        h('div',{className:'stat'},h('div',{className:'stat-label'},'今日の廃棄'),h('div',{className:'stat-val val-red'},todayD)),
        h('div',{className:'stat'},h('div',{className:'stat-label'},'今日の合計'),h('div',{className:'stat-val'},todayLogs.length))
      ),
      h('div',{className:'tabs'},
        h('button',{className:'tab'+(tab==='list'?' on':''),onClick:()=>setTab('list')},'記録一覧'),
        h('button',{className:'tab'+(tab==='stats'?' on':''),onClick:()=>setTab('stats')},'統計'),
        h('button',{className:'tab'+(tab==='qr'?' on':''),onClick:()=>setTab('qr')},'QR一覧')
      ),
      tab==='list'&&h('div',null,
        h('div',{className:'filter-bar'},
          h('select',{value:filter,onChange:e=>setFilter(e.target.value)},
            h('option',{value:'all'},'すべて'),
            h('option',{value:'repair'},'修理のみ'),
            h('option',{value:'disposal'},'廃棄のみ')),
          h('span',{className:'record-count'},filtered.length+' 件')
        ),
        h('div',{className:'card'},
          filtered.length===0
            ?h('div',{className:'empty'},'記録がありません')
            :h('table',null,
              h('thead',null,h('tr',null,
                h('th',null,'日時'),h('th',null,'アクション'),h('th',null,'問題種別'),
                h('th',{className:'hide-sp'},'バッグID'),h('th',{className:'hide-sp'},'作業者'),h('th',{className:'hide-sp'},'メモ'))),
              h('tbody',null,filtered.map(log=>{
                const d=parse(log);
                return h('tr',{key:log.id},
                  h('td',null,h('span',{className:'td-time'},fmtDT(log.scanned_at))),
                  h('td',null,h('span',{className:'badge '+(d.action==='修理'?'badge-r':'badge-d')},d.action)),
                  h('td',null,h('span',{className:'td-issue'},d.issue)),
                  h('td',{className:'hide-sp'},h('span',{className:'td-bag'},d.bag_id||'—')),
                  h('td',{className:'hide-sp'},h('span',{className:'td-worker'},log.worker_name||'—')),
                  h('td',{className:'hide-sp'},h('span',{className:'td-memo',title:d.memo},d.memo||'')));
              }))))
      ),
      tab==='stats'&&h('div',{className:'card'},
        Object.keys(issueStats).length===0
          ?h('div',{className:'empty'},'データがありません')
          :h('div',{className:'chart-section'},
            repairStats.length>0&&h('div',null,
              h('div',{className:'chart-title'},'🔧 修理'),
              repairStats.map(([issue,n])=>h('div',{key:issue,className:'chart-row'},
                h('div',{className:'chart-label',title:issue},issue),
                h('div',{className:'chart-bar-bg'},h('div',{className:'chart-bar bar-r',style:{width:(n/maxN*100)+'%'}})),
                h('div',{className:'chart-n'},n))),
              disposalStats.length>0&&h('div',{className:'chart-sep'})
            ),
            disposalStats.length>0&&h('div',null,
              h('div',{className:'chart-title'},'🗑 廃棄'),
              disposalStats.map(([issue,n])=>h('div',{key:issue,className:'chart-row'},
                h('div',{className:'chart-label',title:issue},issue),
                h('div',{className:'chart-bar-bg'},h('div',{className:'chart-bar bar-d',style:{width:(n/maxN*100)+'%'}})),
                h('div',{className:'chart-n'},n))))
          )
      ),
      tab==='qr'&&React.createElement(QRListTab)
    ),
    showAdd&&h(AddModal,{onClose:()=>{setShowAdd(false);window.history.replaceState({},'',APP_URL);},onAdd:handleAdd,initAction:initParams.action,initIssue:initParams.issue}),
    toast&&h(Toast,{key:toast+Date.now(),msg:toast,onDone:()=>setToast(null)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
